<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Site Maintenance</title>
    <style>
         :root {
            --bg: #0f1724;
            --card: #0b1220;
            --accent: #06b6d4;
            --muted: #94a3b8
        }
        
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, var(--bg), #071025);
            color: #e6eef6
        }
        
        .card {
            max-width: 820px;
            margin: 24px;
            padding: 40px;
            border-radius: 14px;
            background: radial-gradient(1200px 400px at 10% 10%, rgba(6, 182, 212, 0.06), transparent), var(--card);
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
            text-align: center
        }
        
        h1 {
            font-size: 28px;
            margin: 0 0 8px
        }
        
        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.5
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 18px rgba(6, 182, 212, 0.45)
        }
        
        .meta {
            font-size: 13px;
            color: var(--muted)
        }
        
        @media (max-width:520px) {
            .card {
                padding: 28px;
                border-radius: 10px
            }
            h1 {
                font-size: 22px
            }
        }
    </style>
</head>

<body>
    <main class="card" role="main">
        <div class="logo">
            <div class="dot" aria-hidden="true"></div>
            <div style="text-align:left">
                <strong style="display:block">CourtInUse</strong>
                <span class="meta">Scheduled maintenance</span>
            </div>
        </div>
        <h1>We're currently performing maintenance</h1>
        <p>Thanks for your patience — we're making improvements and will be back shortly. </p>
    </main>
</body>

</html>
