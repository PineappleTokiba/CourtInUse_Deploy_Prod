<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Not Found</title>
</head>

<body>
    <script>
        (function() {
            // If the request reached the apex (courtinuse.com) serve a client-side
            // redirect to the www hostname while preserving pathname/search/hash.
            // This is a JS fallback only — a server 301 is still preferred.
            try {
                var host = (window.location.hostname || '').toLowerCase();
                if (host === 'courtinuse.com') {
                    var dest = 'https://www.courtinuse.com' + window.location.pathname + window.location.search + window.location.hash;
                    window.location.replace(dest);
                    return;
                }
            } catch (e) {}

            // Existing SPA fallback: try common locations for the app shell and
            // write the index HTML into the document so the client router can handle the URL.
            var originalPath = window.location.pathname + window.location.search + window.location.hash;
            var tried = 0;
            var parentIndex = (function() {
                var parts = window.location.pathname.split('/');
                parts.pop();
                return (parts.join('/') || '/') + 'index.html';
            })();
            var candidates = ['/index.html', 'index.html', parentIndex];

            function tryFetch() {
                if (tried >= candidates.length) {
                    window.location.replace('/');
                    return;
                }
                fetch(candidates[tried], {
                    cache: 'no-store'
                }).then(function(r) {
                    if (!r.ok) throw new Error('not ok');
                    return r.text();
                }).then(function(html) {
                    document.open();
                    document.write(html);
                    document.close();
                    try {
                        history.replaceState({}, '', originalPath);
                    } catch (e) {}
                }).catch(function() {
                    tried++;
                    tryFetch();
                });
            }

            tryFetch();
        })();
    </script>
</body>

</html>
